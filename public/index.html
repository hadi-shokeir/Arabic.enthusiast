<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arabic Enthusiast — Learn Arabic with Passion & Precision</title>
<meta name="description" content="Professional Arabic language courses — Classical, Levantine, and Quranic. Learn with passion and precision." />
<meta name="theme-color" content="#0a0805" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Arabic Enthusiast" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0a0805; --ink2: #100e0a;
  --gold: #c9922a; --gold2: #e5b04a;
  --cream: #f5f0e8; --muted: rgba(245,240,232,0.5);
  --border: rgba(201,146,42,0.15);
}
html { scroll-behavior: smooth; }
body {
  background: var(--ink); color: var(--cream);
  font-family: 'DM Sans', sans-serif; overflow-x: hidden; min-height: 100vh;
}
::selection { background: rgba(201,146,42,0.3); color: #f5f0e8; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0805; }
::-webkit-scrollbar-thumb { background: rgba(201,146,42,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,146,42,0.5); }
@keyframes spin       { to { transform: rotate(360deg); } }
@keyframes float      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes letterFade { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
@keyframes fadeInUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes scrollLine { 0%,100%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1;transform:scaleY(1)} }
.page-enter { animation: pageIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes pageIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
input::placeholder, textarea::placeholder { color: rgba(245,240,232,0.2); }
input, textarea { color-scheme: dark; }
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}
#root { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="/data.js"></script>
<script type="text/babel" src="/components.jsx"></script>
<script type="text/babel" src="/pages/Home.jsx"></script>
<script type="text/babel" src="/pages/Courses.jsx"></script>
<script type="text/babel" src="/pages/Dashboard.jsx"></script>
<script type="text/babel" src="/pages/Pricing.jsx"></script>
<script type="text/babel" src="/pages/About.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState('home');
  const [lesson, setLesson] = useState('arabic-foundations');
  const [key, setKey] = useState(0);

  useEffect(() => {
    const saved = sessionStorage.getItem('ae_page');
    const savedLesson = sessionStorage.getItem('ae_lesson');
    if (saved) setPage(saved);
    if (savedLesson) setLesson(savedLesson);
  }, []);

  function navigateTo(newPage) {
    setPage(newPage);
    setKey(k => k + 1);
    sessionStorage.setItem('ae_page', newPage);
    window.scrollTo(0, 0);
  }

  function navigateLesson(courseId) {
    setLesson(courseId);
    sessionStorage.setItem('ae_lesson', courseId);
  }

  return (
    <div>
      <Nav page={page} setPage={navigateTo} />
      <main key={key} className="page-enter">
        {page === 'home'      && <HomePage      setPage={navigateTo} />}
        {page === 'courses'   && <CoursesPage   setPage={navigateTo} setLesson={navigateLesson} />}
        {page === 'lesson'    && <LessonPage    courseId={lesson}    setPage={navigateTo} />}
        {page === 'dashboard' && <DashboardPage setPage={navigateTo} />}
        {page === 'pricing'   && <PricingPage   setPage={navigateTo} />}
        {page === 'about'     && <AboutPage     setPage={navigateTo} />}
      </main>
      {page !== 'lesson' && page !== 'dashboard' && <Footer setPage={navigateTo} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
